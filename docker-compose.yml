version: "3.8"
services:
  weaviate:
    image: semitechnologies/weaviate:1.20.3
    ports:
      - "8080:8080"
    environment:
      - QUERY_DEFAULTS_LIMIT=50
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - ENABLE_MODULES=""
      - CLUSTER_HOSTNAME=weaviate-node1
    volumes:
      - ./data/weaviate:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 10s
      retries: 10

  # optional: you may run other services here later (frontend, ml servers)
